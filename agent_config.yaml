# ──────────────────────────────────────────────────────────────────
# GDPVal Benchmark — Agent Configuration
# ──────────────────────────────────────────────────────────────────
#
# Register one or more CLI agents below. Each top-level key is the
# agent name, used with `--agent <name>` when running the benchmark.
#
# Available placeholders (expanded at runtime in command and env):
#   {workspace}       — Absolute path to the task workspace directory
#   {prompt}          — The full task prompt text (shell-escaped)
#   {prompt_file}     — Path to a temp file containing the task prompt
#   {task_id}         — The task ID string
#   {task_json}       — Absolute path to the task.json file
#   {agent_data_dir}  — Absolute path to the agent's isolated data dir
#
# ──────────────────────────────────────────────────────────────────

# claude:
#   command: "claude -p {prompt} --output-format text --max-turns 30"
#   output_format: text        # "text", "json", or "stream-json"
#   timeout: 1800
#   concurrency: 1
#   env: {}
#   use_bwrap: false

openharness:
  command: "cd /mnt/tidalfs-bdsz01/dataset/xyliu/Github/OpenHarness && uv run oh -p {prompt} --output-format json --max-turns 30"
  output_format: json
  timeout: 1800
  concurrency: 1
  use_bwrap: true
  agent_data_dir: ".agent_data/openharness"   # relative to workspace root
  env:
    OPENHARNESS_CONFIG_DIR: "{agent_data_dir}"
    OPENHARNESS_DATA_DIR: "{agent_data_dir}/data"
    OPENHARNESS_LOGS_DIR: "{agent_data_dir}/logs"
  extra_writable_dirs:             # additional dirs the agent can write to
    - /mnt/tidalfs-bdsz01/dataset/xyliu/Github/OpenHarness         # e.g. the agent's own codebase

