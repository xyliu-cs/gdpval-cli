# ──────────────────────────────────────────────────────────────────
# GDPVal Benchmark — Agent Configuration
# ──────────────────────────────────────────────────────────────────
#
# Register one or more CLI agents below. Each top-level key is the
# agent name, used with `--agent <name>` when running the benchmark.
#
# Available placeholders (expanded at runtime):
#   {workspace}   — Absolute path to the task workspace directory
#   {prompt}      — The full task prompt text (shell-escaped)
#   {prompt_file} — Path to a temp file containing the task prompt
#   {task_id}     — The task ID string
#   {task_json}   — Absolute path to the task.json file
#
# ──────────────────────────────────────────────────────────────────

claude:
  command: "claude -p {prompt} --output-format text --max-turns 30"
  output_format: text    # "text" (default) or "json"
  timeout: 1800
  concurrency: 1
  env: {}
  use_bwrap: false

# openhands:
#   command: "python -m my_agent --task-file {task_json} --workspace {workspace}"
#   output_format: json   # parses {"type": "result", "text": "..."} from stdout
#   timeout: 3600
